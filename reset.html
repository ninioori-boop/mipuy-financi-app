<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>איפוס סיסמה</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --card: #161826;
      --text: #e6e7ee;
      --muted: #7a80a0;
      --accent: #6c63ff;
      --accent3: #43e97b;
      --accent2: #ff6584;
      --border: #2a2d3e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    h1 {
      margin: 0 0 20px;
      font-size: 1.4rem;
      text-align: center;
      color: var(--accent);
    }
    .state-msg {
      text-align: center;
      padding: 16px 0;
      font-size: .95rem;
      line-height: 1.5;
    }
    .state-msg.error { color: var(--accent2); }
    .state-msg.success { color: var(--accent3); }
    label {
      display: block;
      font-size: .82rem;
      color: var(--muted);
      margin: 12px 0 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 11px 12px;
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .95rem;
      direction: ltr;
      text-align: left;
      font-family: inherit;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #5a52e0; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .email-line {
      font-size: .82rem;
      color: var(--muted);
      text-align: center;
      margin: 8px 0 16px;
      direction: ltr;
    }
    .back-link {
      display: block;
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      margin-top: 20px;
      text-decoration: none;
    }
    .back-link:hover { color: var(--accent); text-decoration: underline; }
    .hint {
      font-size: .76rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .err {
      color: var(--accent2);
      font-size: .82rem;
      margin-top: 10px;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>איפוס סיסמה</h1>
    <div id="loading" class="state-msg">בודק קישור…</div>

    <div id="form-wrap" style="display:none">
      <div class="email-line" id="email-line"></div>
      <label for="pw1">סיסמה חדשה</label>
      <input id="pw1" type="password" autocomplete="new-password" minlength="6">
      <div class="hint">לפחות 6 תווים</div>
      <label for="pw2">אימות סיסמה</label>
      <input id="pw2" type="password" autocomplete="new-password" minlength="6">
      <div class="err" id="err"></div>
      <button id="submit-btn" onclick="doReset()">עדכן סיסמה</button>
    </div>

    <div id="result" class="state-msg" style="display:none"></div>
    <a href="/" class="back-link">← חזרה לעמוד ההתחברות</a>
  </div>

  <script>
    (function() {
      function qp(name) {
        var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
        return m ? decodeURIComponent(m[1]) : '';
      }

      var mode     = qp('mode');
      var oobCode  = qp('oobCode');
      var loading  = document.getElementById('loading');
      var formWrap = document.getElementById('form-wrap');
      var result   = document.getElementById('result');
      var emailLine= document.getElementById('email-line');
      var errEl    = document.getElementById('err');
      var verifiedEmail = '';

      function showError(msg) {
        loading.style.display = 'none';
        formWrap.style.display = 'none';
        result.style.display = 'block';
        result.className = 'state-msg error';
        result.innerHTML = msg;
      }

      function showSuccess(msg) {
        loading.style.display = 'none';
        formWrap.style.display = 'none';
        result.style.display = 'block';
        result.className = 'state-msg success';
        result.innerHTML = msg;
      }

      function errMsg(code) {
        var map = {
          'auth/expired-action-code': 'הקישור פג תוקף. בקש איפוס חדש מעמוד ההתחברות.',
          'auth/invalid-action-code': 'הקישור אינו תקף או כבר נוצל. בקש איפוס חדש.',
          'auth/user-disabled': 'החשבון הושבת. פנה לתמיכה.',
          'auth/user-not-found': 'החשבון לא נמצא.',
          'auth/weak-password': 'הסיסמה חלשה מדי. בחר לפחות 6 תווים.'
        };
        return map[code] || 'שגיאה: ' + code;
      }

      if (mode !== 'resetPassword' || !oobCode) {
        showError('קישור לא תקין. חזור לעמוד ההתחברות ובקש איפוס חדש.');
        return;
      }

      auth.verifyPasswordResetCode(oobCode)
        .then(function(email) {
          verifiedEmail = email;
          loading.style.display = 'none';
          formWrap.style.display = 'block';
          emailLine.textContent = 'איפוס סיסמה עבור: ' + email;
          setTimeout(function() { document.getElementById('pw1').focus(); }, 100);
        })
        .catch(function(err) {
          showError(errMsg(err.code));
        });

      window.doReset = function() {
        var pw1 = document.getElementById('pw1').value;
        var pw2 = document.getElementById('pw2').value;
        errEl.textContent = '';
        if (pw1.length < 6) { errEl.textContent = 'הסיסמה חייבת להיות לפחות 6 תווים.'; return; }
        if (pw1 !== pw2)    { errEl.textContent = 'הסיסמאות אינן תואמות.'; return; }

        var btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'מעדכן…';

        auth.confirmPasswordReset(oobCode, pw1)
          .then(function() {
            showSuccess('הסיסמה עודכנה בהצלחה.<br>מעביר לעמוד ההתחברות…');
            setTimeout(function() { location.href = '/'; }, 1800);
          })
          .catch(function(err) {
            btn.disabled = false;
            btn.textContent = 'עדכן סיסמה';
            errEl.textContent = errMsg(err.code);
          });
      };
    })();
  </script>
</body>
</html>
